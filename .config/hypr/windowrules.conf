# ▀▄▀▄▀ █ █░▀█ █▄▀ █▄█ ▀▄▀▄▀   █▀▄ █▄█ █▄▄ ██▄ ▄█

# See https://wiki.hyprland.org/Configuring/Window-Rules/

#? ------- WINDOWRULES_HYPRLAND_V_0_53 COMPATIBLE ----------------
#   This Config is compatible with windowrules changes in Hyprland v0.53+
#   Any future breaking changes disables this block and notifies the user to update.
#   User template files will be provided in $XDG_DATA_HOME/hyde/templates/hypr/windowrules.conf for manual update. 

# hyprlang if WINDOWRULES_HYPRLAND_V_0_53

# -----------------------------
# IDLE INHIBIT RULES
# -----------------------------
windowrule = idle_inhibit fullscreen true, match:class ^(.*celluloid.*)$|^(.*mpv.*)$|^(.*vlc.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*[Ss]potify.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*LibreWolf.*)$|^(.*floorp.*)$|^(.*brave-browser.*)$|^(.*firefox.*)$|^(.*chromium.*)$|^(.*zen.*)$|^(.*vivaldi.*)$

# -----------------------------
# PICTURE-IN-PICTURE RULE
# -----------------------------
windowrule {
    name = hyde_picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    tag = +picture-in-picture
    tag = +hyde_picture_in_picture
    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.73) (monitor_h*0.72)
    size = (monitor_w*0.25) (monitor_h*0.25)
    pin = true
}

# -----------------------------
# FLOATING WINDOWS
# -----------------------------
windowrule = float true,match:class ^(Signal)$
windowrule = float true,match:class ^(com.github.rafostar.Clapper)$
windowrule = float true,match:class ^(app.drey.Warp)$
windowrule = float true,match:class ^(net.davidotek.pupgui2)$
windowrule = float true,match:class ^(yad)$
windowrule = float true,match:class ^(eog)$
windowrule = float true,match:class ^(io.github.alainm23.planify)$
windowrule = float true,match:class ^(io.gitlab.theevilskeleton.Upscaler)$
windowrule = float true,match:class ^(com.github.unrud.VideoDownloader)$
windowrule = float true,match:class ^(io.gitlab.adhami3310.Impression)$
windowrule = float true,match:class ^(io.missioncenter.MissionCenter)$

# -----------------------------
# WORKAROUND FOR JETBRAINS IDE POPUPS
# -----------------------------
windowrule = no_initial_focus true,match:class ^(.*jetbrains.*)$,match:title ^(win[0-9]+)$

# -----------------------------
# LAYERRULES (BLUR, NOTIFICATIONS)
# -----------------------------
layerrule = blur true,match:namespace rofi
layerrule = ignore_alpha 0,match:namespace rofi
layerrule = blur true,match:namespace notifications
layerrule = ignore_alpha 0,match:namespace notifications
layerrule = blur true,match:namespace swaync-notification-window
layerrule = ignore_alpha 0,match:namespace swaync-notification-window
layerrule = blur true,match:namespace swaync-control-center
layerrule = ignore_alpha 0,match:namespace swaync-control-center
layerrule = blur true,match:namespace logout_dialog

# -----------------------------
# GLOBAL OPACITY RULE (ACTIVE / INACTIVE)
# -----------------------------
windowrule = opacity 1.0 0.95, match:class ^(.*)$

# -----------------------------
# CENTERED FILE DIALOGS
# -----------------------------
windowrule = float 1, match:title ^(Open File|Save File|Select File|Open Folder)$
windowrule = center 1, match:title ^(Open File|Save File|Select File|Open Folder)$
windowrule = size 60% 60%, match:title ^(Open File|Save File|Select File|Open Folder)$

# -----------------------------
# GENERIC DIALOG WINDOWS
# -----------------------------
windowrule = float 1, match:title ^(.*Dialog.*)$
windowrule = center 1, match:title ^(.*Dialog.*)$

# -----------------------------
# AUTHENTICATION / PASSWORD PROMPTS
# -----------------------------
windowrule = float 1, match:class ^(polkit-gnome-authentication-agent-1)$
windowrule = center 1, match:class ^(polkit-gnome-authentication-agent-1)$

# -----------------------------
# CALCULATOR / SMALL UTILITIES
# -----------------------------
windowrule = float 1, match:class ^(qalculate-gtk)$
windowrule = center 1, match:class ^(qalculate-gtk)$
windowrule = size 500 600, match:class ^(qalculate-gtk)$

# hyprlang endif
